<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Robot Voice</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00d4ff;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container { text-align: center; width: 90%; max-width: 600px; }

        #status { height: 20px; color: var(--accent); margin-bottom: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* Сфера */
        .orb {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, var(--accent) 0%, #0055ff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            border: none;
            outline: none;
            margin: 0 auto 40px;
            font-size: 40px;
            transition: 0.3s;
        }

        .orb.listening {
            animation: pulse 1s infinite;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.8);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Окна текста */
        .box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        .label { font-size: 0.7em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        #user-text { min-height: 1.2em; color: #fff; font-size: 1.1em; }
        #ai-text { min-height: 1.2em; color: #00ffcc; font-size: 1.2em; font-weight: 500; }
        
        /* Эффект печатающегося текста для пользователя */
        .interim { color: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">Нажми, чтобы сказать</div>
        <button id="start-btn" class="orb">🎤</button>

        <div class="box">
            <div class="label">Вы говорите:</div>
            <div id="user-text">...</div>
        </div>

        <div class="box">
            <div class="label">Ответ робота:</div>
            <div id="ai-text">Привет! Я слушаю.</div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        const MODEL = "google/gemini-2.0-flash-exp:free";

        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status');
        const userDisplay = document.getElementById('user-text');
        const aiDisplay = document.getElementById('ai-text');

        let isRecording = false;

        // ГОЛОС
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            window.speechSynthesis.speak(msg);
        }

        // ЗАПРОС К ИИ
        async function askAI(text) {
            status.innerText = "Думаю...";
            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin
                    },
                    body: JSON.stringify({
                        "model": MODEL,
                        "messages": [
                            {"role": "system", "content": "Ты — Алиса. Отвечай очень кратко и по делу."},
                            {"role": "user", "content": text}
                        ]
                    })
                });
                const data = await res.json();
                const answer = data.choices[0].message.content;
                aiDisplay.innerText = answer;
                status.innerText = "Готово";
                speak(answer);
            } catch (e) {
                status.innerText = "Ошибка API";
                aiDisplay.innerText = "Не удалось получить ответ.";
            }
        }

        // СЛУХ (STT)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'ru-RU';
        recognition.interimResults = true; // ПОКАЗЫВАТЬ ТЕКСТ В ПРОЦЕССЕ
        recognition.continuous = false;

        btn.onclick = () => {
            if (!isRecording) {
                recognition.start();
            } else {
                recognition.stop();
            }
        };

        recognition.onstart = () => {
            isRecording = true;
            btn.classList.add('listening');
            status.innerText = "Слушаю вас...";
            userDisplay.innerText = ""; 
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            // Выводим текст на экран мгновенно
            userDisplay.innerHTML = finalTranscript + '<span class="interim">' + interimTranscript + '</span>';

            if (finalTranscript !== '') {
                recognition.stop(); // Авто-стоп при финальной фразе
                askAI(finalTranscript);
            }
        };

        recognition.onend = () => {
            isRecording = false;
            btn.classList.remove('listening');
            if (status.innerText === "Слушаю вас...") status.innerText = "Жду команду";
        };

        recognition.onerror = (e) => {
            isRecording = false;
            btn.classList.remove('listening');
            status.innerText = "Ошибка: " + e.error;
        };
    </script>
</body>
</html>
