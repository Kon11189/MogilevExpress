<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовой Робот ИИ</title>
    <style>
        :root {
            --bg: #0f0f12;
            --accent: #7b2ff7;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
        }

        h1 { margin-bottom: 10px; font-weight: 300; letter-spacing: 2px; }

        #status {
            height: 24px;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .orb {
            width: 150px;
            height: 150px;
            background: linear-gradient(45deg, var(--accent), #3a0ca3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(123, 47, 247, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 0 auto 30px;
            border: none;
            outline: none;
        }

        .orb:hover { transform: scale(1.05); }

        .orb.listening {
            animation: pulse 1.5s infinite;
            background: linear-gradient(45deg, #f72fef, #7b2ff7);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(123, 47, 247, 0.7); }
            70% { box-shadow: 0 0 0 40px rgba(123, 47, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(123, 47, 247, 0); }
        }

        #chat-window {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            min-height: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-text { color: #aaa; font-size: 0.9em; margin-bottom: 10px; }
        .ai-text { color: #fff; font-size: 1.1em; line-height: 1.4; }

        .mic-icon { font-size: 50px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>РОБОТ</h1>
        <div id="status">Нажми на сферу, чтобы начать</div>
        
        <button id="start-btn" class="orb">
            <span class="mic-icon">🎤</span>
        </button>

        <div id="chat-window">
            <div id="user-msg" class="user-text">Ожидание команды...</div>
            <div id="ai-msg" class="ai-text">Привет! Я готов общаться.</div>
        </div>
    </div>

    <script>
        // КОНФИГУРАЦИЯ
        const API_KEY = "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";
        const MODEL = "google/gemini-2.0-flash-exp:free"; // Заменил на более стабильную бесплатную

        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status');
        const userMsg = document.getElementById('user-msg');
        const aiMsg = document.getElementById('ai-msg');

        // 1. СИНТЕЗ ГОЛОСА
        function speak(text) {
            window.speechSynthesis.cancel(); // Остановить текущую речь
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            msg.rate = 1.0;
            msg.pitch = 1.0;
            window.speechSynthesis.speak(msg);
        }

        // 2. РАБОТА С ИИ (OPENROUTER)
        async function getAIResponse(text) {
            status.innerText = "ИИ обрабатывает запрос...";
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin, // Нужно для OpenRouter
                        "X-Title": "My AI Robot"
                    },
                    body: JSON.stringify({
                        "model": MODEL,
                        "messages": [
                            {"role": "system", "content": "Ты — краткий и вежливый голосовой помощник. Отвечай на русском языке. Твои ответы должны быть лаконичными (1-2 предложения)."},
                            {"role": "user", "content": text}
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    aiMsg.innerText = reply;
                    status.innerText = "Отвечаю...";
                    speak(reply);
                } else {
                    throw new Error("Ошибка API или лимитов");
                }

            } catch (error) {
                console.error(error);
                status.innerText = "Ошибка: " + error.message;
                aiMsg.innerText = "Извини, возникли проблемы со связью с сервером.";
            }
        }

        // 3. РАСПОЗНАВАНИЕ РЕЧИ (STT)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            status.innerText = "Ваш браузер не поддерживает распознавание речи.";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.interimResults = false;

            btn.onclick = () => {
                try {
                    recognition.start();
                    btn.classList.add('listening');
                    status.innerText = "Я слушаю...";
                } catch (e) {
                    console.log("Уже запущено");
                }
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userMsg.innerText = "Вы: " + transcript;
                btn.classList.remove('listening');
                getAIResponse(transcript);
            };

            recognition.onerror = (event) => {
                btn.classList.remove('listening');
                status.innerText = "Ошибка распознавания: " + event.error;
            };

            recognition.onspeechend = () => {
                recognition.stop();
                btn.classList.remove('listening');
            };
        }
    </script>
</body>
</html>
